name: Release SeorinCompany Auto Update

on:
  workflow_dispatch:
    inputs:
      version:
        description: "새 버전 번호 (예: 1.16.3)"
        required: true
        default: "1.16.3"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Check project files
        shell: pwsh
        run: |
          Get-ChildItem
          if (!(Test-Path "package.json")) {
            throw "저장소 최상위에 package.json이 없습니다."
          }

      - name: Apply version
        shell: pwsh
        run: |
          npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build and publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build:win -- --publish always

      - name: Verify update files
        shell: pwsh
        run: |
          Get-ChildItem dist -Recurse

          if (!(Test-Path "dist/latest.yml")) {
            throw "dist/latest.yml이 생성되지 않았습니다."
          }

      - name: Upload build backup
        uses: actions/upload-artifact@v4
        with:
          name: SeorinCompany_Auto_Update_${{ inputs.version }}
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error
